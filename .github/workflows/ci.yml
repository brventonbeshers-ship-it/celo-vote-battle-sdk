name: Continuous Integration

on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  test:
    name: CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Initialize project
        run: |
          mkdir ci-workspace && cd ci-workspace
          npm init -y

      - name: Install SDK package
        working-directory: ci-workspace
        run: npm install celo-vote-battle-sdk
        continue-on-error: true

      - name: Require and validate exports
        working-directory: ci-workspace
        run: |
          node -e "
            const sdk = require('celo-vote-battle-sdk');
            const keys = Object.keys(sdk);
            console.log('Module loaded on Node ${{ matrix.node-version }}');
            console.log('Export count:', keys.length);
            keys.forEach(k => console.log(' -', k, ':', typeof sdk[k]));
          "
        continue-on-error: true

      - name: Run npm audit
        working-directory: ci-workspace
        run: npm audit --omit=dev
        continue-on-error: true

      - name: Check package version
        run: npm view celo-vote-battle-sdk version
        continue-on-error: true
